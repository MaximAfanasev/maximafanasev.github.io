	<script>
		const targetCharacters = ['ㅇ', 'ㅏ', 'ㄴ', 'ㄴ', 'ㅕ', 'ㅇ', 'ㅎ', 'ㅏ', 'ㅅ', 'ㅔ', 'ㅇ', 'ㅛ'];
	</script>
	<script>
	document.addEventListener('DOMContentLoaded', function () {
	// Получаем элементы
	const inputBoxes = document.querySelectorAll('.input-box');
	const html = document.documentElement;
	const wordCounter = document.getElementById('wordCounter');
	let correctWordsCount = 0;

	// Функция для очистки и сброса инпутов
	function resetInputs() {
		inputBoxes.forEach(input => {
			input.value = '';
			input.classList.remove('correct', 'incorrect');
			input.disabled = false;
		});

		// Фокус на первый инпут
		inputBoxes[0].focus();
	}

	// Функция для проверки ввода (без учета регистра)
	function checkInput() {
		let allCorrect = true;

		inputBoxes.forEach((input, index) => {
			const value = input.value.trim();

			// Очищаем предыдущие классы
			input.classList.remove('correct', 'incorrect');

			if (value === '') {
				allCorrect = false;
			} else if (value.toLowerCase() === targetCharacters[index].toLowerCase()) {
				// Сравниваем в нижнем регистре для регистронезависимой проверки
				input.classList.add('correct');
			} else {
				input.classList.add('incorrect');
				allCorrect = false;
			}
		});

		// Если все правильно
		if (allCorrect) {
			// Увеличиваем счетчик
			correctWordsCount++;
			wordCounter.textContent = correctWordsCount;
			
			// Ждем 1 секунду, затем очищаем инпуты
			setTimeout(() => {
				resetInputs();
				if (resultMessage) {
					resultMessage.textContent = '';
					resultMessage.className = 'result-message';
				}
			}, 100);
		} else {
			if (resultMessage) {
				resultMessage.textContent = '';
				resultMessage.className = 'result-message';
			}
		}
	}

	// Обработчики событий для инпутов
	inputBoxes.forEach((input, index) => {
		// При вводе символа - автоматически преобразуем в нижний регистр
		input.addEventListener('input', function (e) {
			// Преобразуем введенное значение в нижний регистр
			if (e.target.value !== e.target.value.toLowerCase()) {
				e.target.value = e.target.value.toLowerCase();
			}

			// Автоматически переходим к следующему инпуту
			if (e.target.value !== '') {
				if (index < inputBoxes.length - 1) {
					inputBoxes[index + 1].focus();
				}
			}

			checkInput();
		});

		// При вставке текста (paste) - также преобразуем в нижний регистр
		input.addEventListener('paste', function (e) {
			e.preventDefault();
			const pastedText = (e.clipboardData || window.clipboardData).getData('text');
			const lowerText = pastedText.toLowerCase();
			
			// Вставляем только первый символ, если это однобуквенное поле
			if (input.maxLength === 1) {
				input.value = lowerText.charAt(0);
			} else {
				input.value = lowerText;
			}
			
			checkInput();
		});

		// При нажатии клавиш (для удобства навигации)
		input.addEventListener('keydown', function (e) {
			// Преобразуем вводимые буквы в нижний регистр
			if (e.key.length === 1 && e.key.match(/[a-zA-Z]/) && e.key !== e.key.toLowerCase()) {
				e.preventDefault();
				input.value = e.key.toLowerCase();
				checkInput();
				
				// Автоматически переходим к следующему инпуту
				if (index < inputBoxes.length - 1) {
					setTimeout(() => inputBoxes[index + 1].focus(), 10);
				}
				return;
			}

			if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
				inputBoxes[index - 1].focus();
			}

			if (e.key === 'ArrowLeft' && index > 0) {
				inputBoxes[index - 1].focus();
			}

			if (e.key === 'ArrowRight' && index < inputBoxes.length - 1) {
				inputBoxes[index + 1].focus();
			}
		});
	});

	// Автофокус на первый инпут при загрузке
	inputBoxes[0].focus();
});

    });
    
    // Проверяем, есть ли класс у первого input
    const isHidden = inputBoxes[0] && inputBoxes[0].classList.contains('placeholder-hidden');
    
    // Устанавливаем текст в зависимости от состояния

});</script>
	<script>
	document.addEventListener('DOMContentLoaded', function () {
	// Создаем палочки для визуализации
	const sticksContainer = document.getElementById('sticksContainer');
	for (let i = 0; i < 10; i++) {
		const stick = document.createElement('div');
		stick.className = 'stick';
		stick.style.height = `${15 + (i % 3)}px`; // Разная высота для визуального интереса
		sticksContainer.appendChild(stick);
	}

	// Начальное значение таймера
	let timeLeft = 10;
	const allSticks = document.querySelectorAll('.stick');
	
	// Переменные для управления таймером
	let timerInterval = null;
	let inactivityTimeout = null;
	let isTimerRunning = false;
	const INACTIVITY_TIME = 2000; // 2 секунды бездействия

	// Функция запуска/перезапуска таймера
	function startTimer() {
		if (timerInterval) {
			clearInterval(timerInterval);
		}
		
		isTimerRunning = true;
		
		timerInterval = setInterval(updateCompactTimer, 1000);
	}

	// Функция остановки таймера
	function pauseTimer() {
		if (timerInterval) {
			clearInterval(timerInterval);
			timerInterval = null;
		}
		
		isTimerRunning = false;
	}

	// Функция сброса таймера бездействия
	function resetInactivityTimer() {
		// Если таймер был приостановлен и пользователь проявил активность
		if (!isTimerRunning) {
			// Останавливаем текущий таймер бездействия
			if (inactivityTimeout) {
				clearTimeout(inactivityTimeout);
			}
			
			// Запускаем новый таймер бездействия
			inactivityTimeout = setTimeout(() => {
				startTimer(); // Через 2 секунды бездействия запускаем таймер
			}, INACTIVITY_TIME);
		} else {
			// Если таймер уже работает, просто перезапускаем таймер бездействия
			if (inactivityTimeout) {
				clearTimeout(inactivityTimeout);
			}
			
			inactivityTimeout = setTimeout(() => {
				// Не останавливаем таймер, если он уже работает
			}, INACTIVITY_TIME);
		}
	}

	// Функция обновления таймера
	function updateCompactTimer() {
		// Обновляем отображение времени

		// Обновляем палочки
		const activeSticks = 10 - timeLeft;
		allSticks.forEach((stick, index) => {
			if (index < activeSticks) {
				stick.classList.add('inactive');
			} else {
				stick.classList.remove('inactive');
			}
		});

		// Уменьшаем время
		timeLeft--;

		// Когда время истекло
		if (timeLeft < 0) {
			clearInterval(timerInterval);

			// Делаем все палочки неактивными
			allSticks.forEach(stick => {
				stick.classList.add('inactive');
			});

			// Перенаправление через 0.5 секунды после завершения таймера
			setTimeout(() => {
				window.location.href = "2.html"; // Раскомментируйте и измените на нужный URL

				// Для демонстрации - просто скрываем таймер
				document.getElementById('compactTimer').style.opacity = '0';
				setTimeout(() => {
					document.getElementById('compactTimer').style.display = 'none';
				}, 500);
			}, 500);
		}
	}

	// Инициализируем отображение
	updateCompactTimer();

	// Запускаем таймер изначально
	startTimer();
	
	// Слушатели событий для отслеживания активности пользователя
	const userActivityEvents = [
		'mousedown', 'mousemove', 'keydown', 'scroll',
		'touchstart', 'touchmove', 'click'
	];
	
	userActivityEvents.forEach(eventName => {
		document.addEventListener(eventName, () => {
			// При любой активности пользователя останавливаем таймер
			pauseTimer();
			
			// Сбрасываем таймер бездействия
			resetInactivityTimer();
		}, { passive: true });
	});

	// Добавляем возможность закрыть таймер (опционально)
	const timerHeader = document.querySelector('.timer-header');
	let closeTimer = document.createElement('span');
	closeTimer.style.cursor = 'pointer';
	closeTimer.style.fontSize = '0.8rem';
	closeTimer.addEventListener('click', function () {
		clearInterval(timerInterval);
		if (inactivityTimeout) {
			clearTimeout(inactivityTimeout);
		}
		document.getElementById('compactTimer').style.opacity = '0';
		setTimeout(() => {
			document.getElementById('compactTimer').style.display = 'none';
		}, 300);
	});

	document.querySelector('.timer-header').appendChild(closeTimer);
});</script>
