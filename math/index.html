<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link type="image/x-icon" rel="icon" href="math/math.png">
	<title>Learn and Study</title>
	<style>
		:root {
			--primary: #00ff9d;
			--secondary: #00b8ff;
			--accent: #ff00aa;
			--bg: #0a0a14;
			--text: #e0e0ff;
			--panel: rgba(10, 20, 30, 0.8);
			--glow: 0 0 10px var(--primary);
		}

		@font-face {
			font-family: 'Cyber';
			font-weight: normal;
			font-style: normal;
		}

		body {
			font-family: 'Courier New', monospace;
			background-color: var(--bg);
			color: var(--text);
			margin: 0;
			padding: 0;
			min-height: 100vh;
			overflow-x: hidden;
			line-height: 1.6;
			background-image:
				radial-gradient(circle at 15% 30%, rgba(0, 255, 157, 0.08) 0%, transparent 35%),
				radial-gradient(circle at 85% 70%, rgba(0, 184, 255, 0.07) 0%, transparent 40%),
				repeating-linear-gradient(45deg, rgba(0, 255, 157, 0.02) 0px, rgba(0, 255, 157, 0.02) 2px, transparent 2px, transparent 8px);
			font-size: 32px;
			display: flex;
			flex-direction: row;
			gap: 20px;
			max-width: 320px;
			margin: 0 auto;
			padding-top: 40px;
		}

		a {
			color: gold;
			text-decoration: none;
			display: block;
			border: 2px solid;
			width: fit-content;
			padding: 10px 20px;
			border-radius: 10px;
			height: fit-content;
		}
		
		a:nth-child(2) {
			margin-top: 60px;
		}
		
		a:nth-child(3) {
			margin-top: 120px;
		}
		
		a:nth-child(4) {
			margin-top: 180px;
		}
		
		* {
			/*outline: 1px solid red*/;
		}
		
		.crosshair {
			position: relative;
		}
		
		.crosshair::before {
			position: absolute;
			content : "";
			width: 130px;
			height: 130px;
			border: 2px solid gold;
			left: -35px;
			top: -35px;
			border-radius: 50%;
			background: lightgreen;
			opacity: 0.2;
		}
		
		.tumbler {
			
		}
	</style>
</head>

<body>
	<a href="math/1.html" class="crosshair">1</a>
	<a href="math/2.html">2</a>
	<a href="math/3.html">3</a>
	<a href="math/4.html">4</a>

	<script>
	</script>
</body></html>
