<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Знак числа: Позитив vs Негатив</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* предотвращает выделение текста на кнопках */
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, sans-serif;
            padding: 16px;
        }

        /* главная карточка игры */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border-radius: 70px;
            padding: 24px 20px 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
        }

        /* панель статистики */
        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #00000066;
            padding: 12px 24px;
            border-radius: 100px;
            margin-bottom: 30px;
            backdrop-filter: blur(8px);
            color: white;
            font-weight: bold;
            gap: 15px;
            flex-wrap: wrap;
        }

        .score-box, .timer-box {
            background: #000000aa;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.7rem;
            letter-spacing: 1px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            box-shadow: inset 0 1px 3px #ffffff30, 0 5px 10px #00000030;
        }

        .score-box span:first-child, .timer-box span:first-child {
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            background: #ffd96633;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .score-value, .timer-value {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
            font-family: monospace;
            min-width: 70px;
            text-align: center;
        }

        /* Главное число - эпичный блок */
        .number-card {
            background: radial-gradient(circle at 30% 20%, #fff, #f0f4fa);
            margin: 20px 0 25px;
            border-radius: 80px;
            padding: 30px 10px;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3), inset 0 1px 4px white;
            transition: 0.1s linear;
        }

        .big-number {
            font-size: 7rem;
            font-weight: 900;
            font-family: 'Courier New', 'Fira Mono', monospace;
            color: #111;
            text-shadow: 4px 4px 12px rgba(0,0,0,0.2);
            letter-spacing: 6px;
            word-break: break-word;
        }

        .sign-preview {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e66;
            background: #eef4ffaa;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 80px;
            margin-top: 8px;
        }

        /* блок с кнопками действий */
        .action-buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }

        .game-btn {
            font-size: 2rem;
            font-weight: bold;
            padding: 16px 32px;
            min-width: 190px;
            border: none;
            border-radius: 70px;
            cursor: pointer;
            transition: 0.1s linear;
            background: #ecf0f3;
            box-shadow: 0 8px 0 #8f9bb3;
            color: #1e272e;
            letter-spacing: 2px;
            font-family: inherit;
        }

        .game-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #6a7a92;
        }

        .positive-btn {
            background: #b9f6ca;
            color: #005f2e;
            border-bottom: 2px solid #2e7d32;
        }

        .negative-btn {
            background: #ffcdb2;
            color: #9d2e1a;
            border-bottom: 2px solid #b6512b;
        }

        /* информационная зона */
        .info-area {
            text-align: center;
            margin-top: 20px;
            font-weight: 500;
            background: #00000055;
            border-radius: 50px;
            padding: 10px;
            color: #f9f3d9;
            font-size: 0.9rem;
        }

        /* всплывающий фидбек */
        .feedback-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2c2cd9;
            backdrop-filter: blur(12px);
            color: gold;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.3rem;
            pointer-events: none;
            z-index: 200;
            transition: 0.2s;
            opacity: 0;
            font-family: monospace;
        }

        /* стиль для критической ошибки - таймер сбросит на главную */
        @keyframes pulseRed {
            0% { text-shadow: 0 0 0 red; }
            100% { text-shadow: 0 0 8px rgb(255, 80, 80); }
        }

        .timer-warning {
            animation: pulseRed 0.6s infinite alternate;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #cddde9;
            margin-top: 25px;
        }

        @media (max-width: 550px) {
            .game-btn {
                min-width: 140px;
                padding: 12px 16px;
                font-size: 1.4rem;
            }
            .big-number {
                font-size: 4.4rem;
            }
            .score-value, .timer-value {
                font-size: 1.7rem;
                min-width: 55px;
            }
        }
    </style>
</head>
<body>

<div class="game-container" id="gameRoot">
    <div class="stats-panel">
        <div class="score-box">
            <span>🏆 СЧЁТ</span>
            <span class="score-value" id="scoreDisplay">0</span>
        </div>
        <div class="timer-box">
            <span>⏱️ ТАЙМЕР</span>
            <span class="timer-value" id="timerDisplay">10.0</span>
        </div>
    </div>

    <div class="number-card">
        <div class="big-number" id="numberValue">0</div>
        <div class="sign-preview" id="signHint">( ? )</div>
    </div>

    <div class="action-buttons">
        <button class="game-btn positive-btn" id="positiveBtn">✅ Положительное</button>
        <button class="game-btn negative-btn" id="negativeBtn">❌ Отрицательное</button>
    </div>
</div>

<div id="feedbackToast" class="feedback-toast">👍</div>

<script>
    (function() {
        // -------- ИГРОВЫЕ ПЕРЕМЕННЫЕ ----------
        let currentNumber = 0;          // текущее рандомное число (может быть с минусом)
        let currentSign = '';           // '+' или '-'
        let score = 0;                  // правильные нажатия
        
        // Таймерные переменные
        let timeLeft = 10.0;            // секунд
        let timerInterval = null;
        let isGameActive = true;         // активна ли игра (если false – блокируем кнопки)
        
        // DOM элементы
        const numberSpan = document.getElementById('numberValue');
        const signHintSpan = document.getElementById('signHint');
        const scoreSpan = document.getElementById('scoreDisplay');
        const timerSpan = document.getElementById('timerDisplay');
        const positiveBtn = document.getElementById('positiveBtn');
        const negativeBtn = document.getElementById('negativeBtn');
        const toastEl = document.getElementById('feedbackToast');
        
        // Вспомогательная функция показа уведомления (всплывашка)
        let toastTimeout = null;
        function showFeedback(message, isError = false) {
            if (toastTimeout) clearTimeout(toastTimeout);
            toastEl.style.transition = 'opacity 0.15s';
            toastEl.textContent = message;
            toastEl.style.backgroundColor = isError ? '#6b2e2ee6' : '#1e3a2fe6';
            toastEl.style.color = isError ? '#ffbe9f' : '#d0ffc0';
            toastEl.style.opacity = '1';
            toastTimeout = setTimeout(() => {
                toastEl.style.opacity = '0';
            }, 800);
        }
        
        // Остановить таймер (очистить интервал)
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        // Запустить таймер с нуля (всегда с 10 секунд)
        function startTimer() {
            if (timerInterval) stopTimer();
            // таймер тикает каждые 100мс для плавности отображения 10.0 → 0.0
            timerInterval = setInterval(() => {
                if (!isGameActive) {
                    // если игра не активна (например переход случился) – не обновляем таймер
                    return;
                }
                if (timeLeft <= 0.05) {
                    // ВРЕМЯ ВЫШЛО! Игрок ничего не нажал -> перекидываем на главную страницу
                    if (isGameActive) {
                        // останавливаем игру полностью и делаем редирект
                        isGameActive = false;
                        stopTimer();
                        showFeedback('⏰ Время вышло! Перенаправление...', true);
                        // блокируем кнопки, чтоб игрок не кликнул после таймера
                        setButtonsEnabled(false);
                        // через 0.2 секунды редирект на главную (либо history.back, либо "/")
                        setTimeout(() => {
                            // "главная страница" – абсолютный путь '/' или можно заменить location.origin
                            window.location.href = '/';
                        }, 280);
                    }
                } else {
                    // уменьшаем время с шагом 100мс
                    let step = 0.1;
                    let newTime = timeLeft - step;
                    if (newTime < 0) newTime = 0;
                    timeLeft = parseFloat(newTime.toFixed(1));
                    updateTimerUI();
                    
                    // Добавляем визуальное предупреждение при последних 3 секундах
                    if (timeLeft <= 3.0 && timeLeft > 0) {
                        timerSpan.style.color = '#ffaa88';
                        timerSpan.classList.add('timer-warning');
                    } else {
                        timerSpan.style.color = '';
                        timerSpan.classList.remove('timer-warning');
                    }
                    if (timeLeft <= 0.0) {
                        // повторная страховка на случай, если округление не сработало
                        if (isGameActive) {
                            stopTimer();
                            isGameActive = false;
                            setButtonsEnabled(false);
                            showFeedback('⏰ Время вышло! Переход на главную...', true);
                            setTimeout(() => { window.location.href = '/'; }, 200);
                        }
                    }
                }
            }, 100);
        }
        
        // Обновить отображение таймера
        function updateTimerUI() {
            timerSpan.textContent = timeLeft.toFixed(1);
        }
        
        // Обновить счет на экране
        function updateScoreUI() {
            scoreSpan.textContent = score;
        }
        
        // Генерация случайного числа: может быть положительным, отрицательным или с вариантами a , +a , -a 
        // По условию: "рандомно выскакивает числа a , +a , -a"
        // То есть число может быть как положительным целым, так и отрицательным, либо просто "a" (положительное).
        // Для чистоты: диапазон чисел от 1 до 100 (базовое абсолютное значение),
        // и случайно выбираем ему знак: положительное (без знака или явный +) либо отрицательное.
        function generateRandomNumber() {
            // абсолютное значение от 1 до 100 (можно от 1 до 99, иногда 100)
            let absValue = Math.floor(Math.random() * 100) + 1;  // 1..100
            // случайный выбор знака: true -> положительное, false -> отрицательное
            const isPositive = Math.random() < 0.5;
            let finalNumber = isPositive ? absValue : -absValue;
            let signChar = isPositive ? '+' : '-';
            return { value: finalNumber, sign: signChar };
        }
        
        // Обновить текущую карточку новым числом
        function refreshNumber() {
            if (!isGameActive) return;
            const { value, sign } = generateRandomNumber();
            currentNumber = value;
            currentSign = sign;
            // отображаем число (если отрицательное, то минус уже входит в value)
            numberSpan.textContent = value;
            // дополнительная подсказка знака (для наглядности)
            // небольшая стилистическая смена цвета подсказки
            if (sign === '+') {
                signHintSpan.style.backgroundColor = '#c8e6d9aa';
                signHintSpan.style.color = '#1f543a';
            } else {
                signHintSpan.style.backgroundColor = '#ffe0ccaa';
                signHintSpan.style.color = '#a53112';
            }
        }
        
        // Обработка ответа игрока (ожидаемый знак)
        function handleAnswer(selectedType) {
            if (!isGameActive) {
                showFeedback('Игра завершена. Обновите страницу', true);
                return;
            }
            
            // Определяем является ли текущее число положительным или отрицательным
            const isCurrentPositive = (currentNumber > 0);
            let isCorrect = false;
            
            if (selectedType === 'positive') {
                if (isCurrentPositive) {
                    isCorrect = true;
                } else {
                    isCorrect = false;
                }
            } else if (selectedType === 'negative') {
                if (!isCurrentPositive) {
                    isCorrect = true;
                } else {
                    isCorrect = false;
                }
            }
            
            if (isCorrect) {
                // Увеличиваем счет
                score++;
                updateScoreUI();
                showFeedback(`✔️ Верно! +1 очко (${currentNumber > 0 ? '+' : ''}${currentNumber})`, false);
                // при правильном ответе сбрасываем таймер (обновляем)
                resetTimerAndNext();
            } else {
                // Неправильное нажатие — счет не увеличивается, но игра продолжается
                // Новое число генерируется, таймер сбрасывается заново (наказываем потерей времени но не штрафуем счетом)
                showFeedback(`❌ Неверно! Число ${currentNumber > 0 ? 'положительное' : 'отрицательное'}. Попробуй еще`, true);
                resetTimerAndNext();
            }
        }
        
        // Сбросить таймер и сгенерировать следующее число (после ответа)
        function resetTimerAndNext() {
            if (!isGameActive) return;
            // обнуляем оставшееся время до полных 10 секунд
            timeLeft = 10.0;
            updateTimerUI();
            // перезапускаем таймер (останавливаем старый и запускаем новый)
            stopTimer();
            startTimer();
            // генерируем новое число
            refreshNumber();
            // сбросим предупреждение цвета таймера
            timerSpan.style.color = '';
            timerSpan.classList.remove('timer-warning');
        }
        
        // Блокировка / разблокировка кнопок (полный контроль)
        function setButtonsEnabled(enabled) {
            if (enabled) {
                positiveBtn.disabled = false;
                negativeBtn.disabled = false;
                positiveBtn.style.opacity = '1';
                negativeBtn.style.opacity = '1';
                positiveBtn.style.cursor = 'pointer';
                negativeBtn.style.cursor = 'pointer';
            } else {
                positiveBtn.disabled = true;
                negativeBtn.disabled = true;
                positiveBtn.style.opacity = '0.6';
                negativeBtn.style.opacity = '0.6';
                positiveBtn.style.cursor = 'default';
                negativeBtn.style.cursor = 'default';
            }
        }
        
        // Инициализация или перезапуск (при старте, но используется единожды)
        function initGame() {
            isGameActive = true;
            score = 0;
            timeLeft = 10.0;
            updateScoreUI();
            updateTimerUI();
            // генерируем первое число
            const { value, sign } = generateRandomNumber();
            currentNumber = value;
            currentSign = sign;
            numberSpan.textContent = value;
            if (sign === '+') {
                signHintSpan.style.backgroundColor = '#c8e6d9aa';
            } else {
                signHintSpan.style.backgroundColor = '#ffe0ccaa';
            }
            // активируем кнопки
            setButtonsEnabled(true);
            // запускаем таймер с нуля 
            if (timerInterval) stopTimer();
            startTimer();
        }
        
        // Обработчики кнопок
        function onPositiveClick() {
            if (!isGameActive) {
                showFeedback('Игра остановлена, перезагрузка...', true);
                return;
            }
            handleAnswer('positive');
        }
        
        function onNegativeClick() {
            if (!isGameActive) {
                showFeedback('Игра не активна', true);
                return;
            }
            handleAnswer('negative');
        }
        
        // Привязка событий
        positiveBtn.addEventListener('click', onPositiveClick);
        negativeBtn.addEventListener('click', onNegativeClick);
        
        // Дополнительная безопасность: если страница выгружается или пользователь закрывает — не критично
        // Но так же предусмотрим, что если переход на главную произошёл по таймеру, то всё корректно
        // Дополнительно: обработка beforeunload не требуется
        
        // Запускаем игру
        initGame();
        
        // Экспортируем в глобальную область ничего, но ради отладки можно оставить
        // Для случая, если пользователь захочет прервать таймер через перезапись переменных — не нужно.
        // Однако, если кто-то вызовет перезагрузку вкладки окей.
        
        // Также: добавляем скрытый "сброс" если на главную по таймеру ушли, то при возврате через кнопку назад браузера
        // страница переинициализируется (благодаря onload или просто заново выполнится скрипт). Это корректно.
        // При первом запуске всё работает как часы.
        
        // Но есть особенность: при срабатывании таймера мы делаем location.href='/'. Это может быть нежелательно если
        // страница находится не на корне (например в подпапке). Однако по заданию "перекинет на главную страницу".
        // Главная страница условно '/'. В реальности можно заменить на '/index.html' или document.referrer, но по условию просто главная.
        // Для улучшения: если текущий location.pathname != '/', то можно перекинуть на '/', но это стандартное поведение.
        // Также можно использовать window.location.assign('/'); пользователь вернётся.
        // Дополнительно: при непредвиденных ошибках подстраховка.
        // добавим функцию корректного перехода, чтобы в случае не корневого пути но пользователь ожидал главную средину.
        // Однако это лучшая реализация.
        
        // Плюс: при редиректе на главную таймер останавливается, игра прекращается корректно, даже если новый контекст не сохранится
        // Современные браузеры обработают.
        // Но чтобы не было ложных срабатываний с timer warning style — всё нормально.
        
        // Дополнение: если хоть раз игра перестала быть активной из-за таймаута, кнопки заблокированы,
        // и повторное нажатие ничего не сломает.
        // Также возможен баг: если пользователь жмёт очень быстро несколько раз подряд, handleAnswer вызывает resetTimerAndNext,
        // который останавливает и запускает таймер, генерирует новое число - всё согласованно.
        // Но стоит избегать многократного последовательного срабатывания: добавим защиту от дублирования? 
        // При каждом вызове handleAnswer -> resetTimerAndNext обновляет число и таймер. Если игрок кликает несколько раз до обновления UI,
        // может выполниться несколько вызовов, но благодаря проверке isGameActive и мгновенному сбросу таймера, это не причинит вреда,
        // однако может накрутить счет многократно за одно число? 
        // НЕТ: потому что после первого верного ответа счет увеличится, refreshNumber перегенерирует число, и второй клик (по одной и той же кнопке)
        // произведет анализ нового числа, что создаст эффект "следующий ответ". Хотя это не страшно, но пользователь может случайно дважды кликнуть и получить пару очков,
        // если очень быстро кликнуть дважды подряд. Чтобы этого избежать, добавим защиту от повторного клика на 200мс. 
        // Сделаем дебаунс или блокировку на время обработки.
        // Реализуем простую блокировку на 150 мс после клика.
    })();

    // Доработка: "Защита от спама", чтобы нельзя было дважды быстро нажать и получить плюс два очка за одно число.
    // Усовершенствуем код: добавим флаг waitingForNext, но в функции handleAnswer будем проверять и блокировать.
    // Для этого переопределим обработчики внутри замыкания, но проще добавить флаг прямо в существующей инициализации.
    // Но код уже выполнился в самовызывающейся функции. Перепишем с дополнительной блокировкой.
    // Обновим скрипт добавив механизм дебаунса без изменения читаемости.
    // Так как код выше написан, но в реальном исполнении нужно чтобы работало без двойных очков.
    // Я модифицирую скрипт перед финальным выводом: внедрю защиту через canAnswer флаг.
    // Покажу итоговую версию с полноценной защитой от двойных кликов.
    
    // Ниже финальный исправленный код с флагом ожидания (но дублировать всю функцию не буду, а перезапишу корректно).
    // Но т.к. я должен выдать единый рабочий html, я интегрирую полную версию с защитой.
    // ВНИМАНИЕ: Предыдущий блок скрипта выше был рабочим, но у него микро-баг с двойным кликом.
    // Я перепишу скрипт полностью, чтобы он был идеальным.
</script>

<!-- ПЕРЕРАБОТАННЫЙ СКРИПТ С ЗАЩИТОЙ ОТ ДВОЙНЫХ КЛИКОВ -->
<script>
    (function finalGame() {
        // DOM элементы
        const numberSpan = document.getElementById('numberValue');
        const signHintSpan = document.getElementById('signHint');
        const scoreSpan = document.getElementById('scoreDisplay');
        const timerSpan = document.getElementById('timerDisplay');
        const positiveBtn = document.getElementById('positiveBtn');
        const negativeBtn = document.getElementById('negativeBtn');
        const toastEl = document.getElementById('feedbackToast');
        
        let currentNumber = 0;
        let currentSign = '+';
        let score = 0;
        let timeLeft = 10.0;
        let timerInterval = null;
        let isActive = true;
        let isProcessing = false;     // блокировка повторных кликов
        
        function showMessage(msg, isErr = false) {
            if (window.toastTimeout) clearTimeout(window.toastTimeout);
            toastEl.style.transition = 'opacity 0.15s';
            toastEl.textContent = msg;
            toastEl.style.backgroundColor = isErr ? '#8b3c2ce6' : '#1f4f2ae6';
            toastEl.style.color = isErr ? '#ffcfb0' : '#e0ffd0';
            toastEl.style.opacity = '1';
            window.toastTimeout = setTimeout(() => { toastEl.style.opacity = '0'; }, 800);
        }
        
        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }
        
        function updateTimerUI() { timerSpan.textContent = timeLeft.toFixed(1); }
        function updateScoreUI() { scoreSpan.textContent = score; }
        
        function startTimer() {
            if (timerInterval) stopTimer();
            timerInterval = setInterval(() => {
                if (!isActive) return;
                if (timeLeft <= 0.05) {
                    if (isActive) {
                        isActive = false;
                        stopTimer();
                        positiveBtn.disabled = true;
                        negativeBtn.disabled = true;
                        showMessage('⏰ Время вышло! Переход на главную...', true);
                        setTimeout(() => { window.location.href = '/'; }, 250);
                    }
                } else {
                    timeLeft = parseFloat((timeLeft - 0.1).toFixed(1));
                    if (timeLeft < 0) timeLeft = 0;
                    updateTimerUI();
                    if (timeLeft <= 3.0 && timeLeft > 0) {
                        timerSpan.style.color = '#ffaa88';
                        timerSpan.classList.add('timer-warning');
                    } else {
                        timerSpan.style.color = '';
                        timerSpan.classList.remove('timer-warning');
                    }
                }
            }, 100);
        }
        
        function generateNumber() {
            let absVal = Math.floor(Math.random() * 100) + 1;
            let isPos = Math.random() < 0.5;
            let val = isPos ? absVal : -absVal;
            return { value: val, sign: isPos ? '+' : '-' };
        }
        
        function refreshNumber() {
            if (!isActive) return;
            const { value, sign } = generateNumber();
            currentNumber = value;
            currentSign = sign;
            numberSpan.textContent = value;
            signHintSpan.style.backgroundColor = sign === '+' ? '#c8e6d9aa' : '#ffe0ccaa';
        }
        
        function resetGameCycle() {
            if (!isActive) return;
            timeLeft = 10.0;
            updateTimerUI();
            stopTimer();
            startTimer();
            refreshNumber();
            timerSpan.style.color = '';
            timerSpan.classList.remove('timer-warning');
        }
        
        function handleAnswer(type) {
            if (!isActive) { showMessage('Игра завершена', true); return; }
            if (isProcessing) { showMessage('Спокойствие, успеваешь!', false); return; }
            isProcessing = true;
            
            const isPosNum = currentNumber > 0;
            let correct = false;
            if (type === 'positive' && isPosNum) correct = true;
            if (type === 'negative' && !isPosNum) correct = true;
            
            if (correct) {
                score++;
                updateScoreUI();
                showMessage(`✔️ Верно! +1 (${currentNumber})`, false);
            } else {
                showMessage(`❌ Ошибка! Число ${currentNumber > 0 ? 'положительное' : 'отрицательное'}`, true);
            }
            // в любом случае сбрасываем таймер и новое число
            resetGameCycle();
            setTimeout(() => { isProcessing = false; }, 200);
        }
        
        positiveBtn.onclick = () => handleAnswer('positive');
        negativeBtn.onclick = () => handleAnswer('negative');
        
        function init() {
            isActive = true;
            score = 0;
            timeLeft = 10.0;
            updateScoreUI();
            updateTimerUI();
            const { value, sign } = generateNumber();
            currentNumber = value;
            currentSign = sign;
            numberSpan.textContent = value;
            positiveBtn.disabled = false;
            negativeBtn.disabled = false;
            positiveBtn.style.opacity = '1';
            negativeBtn.style.opacity = '1';
            startTimer();
        }
        init();
    })();
</script>
</body>
</html>
