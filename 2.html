<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Python</title>
	
	<style>
		body {
			background: #000;
			color: #fff;
			font-family: monospace;
			font-size: 30px;
			padding: 20px;
		}
		div {
			margin-bottom: 10px;
		}
		img {
			width: calc(100% - 10px);
			max-width: 550px;
			border-radius: 20px;
			border: 2px dashed gold;
			margin: 20px auto;
			margin-top: 50px;
		}
		.one {
			color: #fff;
		}
		.two {
			color: gold;
		}
		.white {
			color: #fff;
		}
		.three {
			color: red;
		}
	</style>
</head>
<body>
	<div class="one">a = 7 создание переменной и присвоение значения</div>
	<div class="two">print(<span class="white">a</span>) вывод </div>
	<img src="1.png" alt="" width="100%">
</body>
</html>
