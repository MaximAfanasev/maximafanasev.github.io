<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Python</title>
	<style>
		body {
			background: #000;
			color: #fff;
			font-family: monospace;
			font-size: 30px;
			line-height: 50px;
		}
		ul {
			border: 1px dashed aqua;
			width: fit-content;
			border-radius: 20px;
			padding: 30px;
			margin: 50px auto;
			list-style: none;
		}
		.one {
			color: gold
		}
		.two {
			color: royalblue;
		}
		.end {
			color: red;
		}
	</style>
</head>

<body>
	<ul>
		<li class="one">a = 7</li>
		<li class="two">print(<span class="one">a</span>)</li>
		<li class="end">7</li>
	</ul>
	<ul>
		<li class="one">b = a</li>
		<li class="two">print(<span class="one">b</span>)</li>
		<li class="end">7</li>
	</ul>



</body></html>
