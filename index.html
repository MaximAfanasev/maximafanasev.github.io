<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link type="image/x-icon" rel="icon" href="img/flag.png">
	<title>Голубика</title>
	<style>
		:root {
			--primary: #00ff9d;
			--secondary: #00b8ff;
			--accent: #ff00aa;
			--bg: #0a0a14;
			--text: #e0e0ff;
			--panel: rgba(10, 20, 30, 0.8);
			--glow: 0 0 10px var(--primary);
		}

		@font-face {
			font-family: 'Cyber';
			font-weight: normal;
			font-style: normal;
		}

		body {
			font-family: 'Courier New', monospace;
			background-color: var(--bg);
			color: var(--text);
			margin: 0;
			padding: 0;
			min-height: 100vh;
			overflow-x: hidden;
			line-height: 1.6;
			padding: 20px;
			background-image:
				radial-gradient(circle at 15% 30%, rgba(0, 255, 157, 0.08) 0%, transparent 35%),
				radial-gradient(circle at 85% 70%, rgba(0, 184, 255, 0.07) 0%, transparent 40%),
				repeating-linear-gradient(45deg, rgba(0, 255, 157, 0.02) 0px, rgba(0, 255, 157, 0.02) 2px, transparent 2px, transparent 8px);
			font-size: 20px;
		}
		.wrap {
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
			gap: 20px;
			
		}
		a {
			color: gold;
			display: flex;
			flex-direction: column;
			gap: 20px;
			border: 1px solid gray;
			width: fit-content;
			padding: 20px;
			border-radius: 20px;
			text-decoration: none;
			font-size: 30px;
			max-width: 200px;
		}
		
		img {
			border-radius: 10px;
		}
	</style>
</head>

<body>
	<h1>Голубика</h1>

	<a href="hardiblue/index.html">Харди Блю <img src="hardiblue/1.png" alt="" width="200px"></a>
	
	<a href="erliblue/index.html">Ерли Блю <img src="erliblue/1.jpg" alt="" width="200px"></a>
	
	<a href="veimut/index.html">Веймут<img src="veimut/1.jpg" alt="" width="200px"></a>
	
	<a href="bluegold/index.html">Блюголд<img src="bluegold/1.jpg" alt="" width="200px"></a>
	
	<a href="jerci/index.html">Джерси<img src="jerci/1.jpg" alt="" width="200px"></a>
	</div>
</body></html>
