<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link type="image/x-icon" rel="icon" href="img/flag.png">
	<title>Maxim Afanasev</title>
	<style>
		:root {
			--primary: #00ff9d;
			--secondary: #00b8ff;
			--accent: #ff00aa;
			--bg: #0a0a14;
			--text: #e0e0ff;
			--panel: rgba(10, 20, 30, 0.8);
			--glow: 0 0 10px var(--primary);
		}

		@font-face {
			font-family: 'Cyber';
			font-weight: normal;
			font-style: normal;
		}

		body {
			font-family: 'Courier New', monospace;
			background-color: var(--bg);
			color: var(--text);
			margin: 0;
			padding: 0;
			min-height: 100vh;
			overflow-x: hidden;
			line-height: 1.6;
			padding: 20px;
			background-image:
				radial-gradient(circle at 15% 30%, rgba(0, 255, 157, 0.08) 0%, transparent 35%),
				radial-gradient(circle at 85% 70%, rgba(0, 184, 255, 0.07) 0%, transparent 40%),
				repeating-linear-gradient(45deg, rgba(0, 255, 157, 0.02) 0px, rgba(0, 255, 157, 0.02) 2px, transparent 2px, transparent 8px);
			font-size: 32px;
		}
		input {
			border-radius: 5px;
			background: #333;
			color: #fff;
			height: 40px;
			font-size: 32px;
			}
	</style>
</head>

<body>
	<h1>?!</h1>
	 <div>a + b = c</div>
	 <div>a = ?</div>
	 <input type="text" id="myInput" oninput="checkInput()">
	 <span id="result"></span>
	 
	 <input type="text" id="myInput2" oninput="checkInput2()">
	 <span id="result2"></span>
	 <div>b = ?</div>
		
		<script>
        function checkInput() {
            let inputValue = document.getElementById('myInput').value;
            let result = document.getElementById('result');
            
            if (inputValue === 'c-b') {
                result.innerHTML = '✅';
                result.style.color = 'green';
            } else if (inputValue.length > 0) {
                result.innerHTML = '❌';
                result.style.color = 'red';
            } else {
                result.innerHTML = '';
            }
        }
        function checkInput2() {
            let inputValue = document.getElementById('myInput2').value;
            let result2 = document.getElementById('result2');
            
            if (inputValue === '-c+b') {
                result2.innerHTML = '✅';
                result2.style.color = 'green';
            } else if (inputValue.length > 0) {
                result2.innerHTML = '❌';
                result2.style.color = 'red';
            } else {
                result2.innerHTML = '';
            }
        }
	
	</script>
</body></html>
