		body {

			flex-direction: column;

			position: relative;

		.pagination-wrapper {
			position: relative;
			margin-bottom: 80px;
			border-radius: 4rem;
			padding: 2rem 2.8rem;
			box-shadow:
				0 30px 60px -20px rgba(0, 20, 40, 0.4),
				0 8px 24px rgba(0, 0, 0, 0.04),
				inset 0 1px 0 rgba(255, 255, 255, 0.7);

			transition: box-shadow 0.3s ease, transform 0.2s ease;
			max-width: 800px;
			width: 100%;
		}

		.pagination-wrapper:nth-child(2)::after {
			position: absolute;
			content: "";
			width: 0px;
			border: 1px dashed #ff5f1d;
			height: 75px;
			background: transparent;
			bottom: -80px;
			right: 70px;
		}

		.pagination-wrapper:nth-child(2)::before {
			position: absolute;
			content: "";
			width: 0px;
			border: 1px dashed #ff5f1d;
			height: 75px;
			background: transparent;
			bottom: -80px;
			left: 70px;
		}

		.pagination-wrapper:nth-child(3)::after {
			position: absolute;
			content: "";
			width: 0px;
			border: 1px dashed #36415b;
			height: 75px;
			background: transparent;
			bottom: -80px;
			right: 70px;
		}

		.pagination-wrapper:nth-child(3)::before {
			position: absolute;
			content: "";
			width: 0px;
			border: 1px dashed #36415b;
			height: 75px;
			background: transparent;
			bottom: -80px;
			left: 70px;
		}

		.pagination-wrapper:nth-child(4)::after {
			position: absolute;
			content: "";
			width: 0px;
			border: 1px dashed #ec33c3;
			height: 75px;
			background: transparent;
			bottom: -80px;
			right: 70px;
		}

		.pagination-wrapper:nth-child(4)::before {
			position: absolute;
			content: "";
			width: 0px;
			border: 1px dashed #ec33c3;
			height: 75px;
			background: transparent;
			bottom: -80px;
			left: 70px;

		.pagination-wrapper:nth-child(5)::after {

			content: "";
			width: 0px;
			border: 1px dashed #338bec;

			background: transparent;

		.pagination-wrapper:nth-child(5)::before {

		.pagination-wrapper:nth-child(2) {

		.pagination-wrapper:nth-child(3) {

			background-size: 150px, 150px;

		}

		.pagination-wrapper:nth-child(4) {
			background: url("3.webp") no-repeat right top 30%;

			color: #fff;
		}

		.pagination-wrapper:nth-child(5) {
			background: url("15.png") no-repeat right 240px bottom 10px, url("16.png") no-repeat right 40px top 10px;
			background-size: 100px, 100px;
			color: #fff;
		}

		.pagination-wrapper:nth-child(6) {
			background: url("23.png") no-repeat right 40px top 70px;
			background-size: 250px;
			color: #fff;
		}

		.pagination-wrapper:nth-child(3) {
			position: relative;
			transform: rotateY(-50deg);
		}

		.pagination-wrapper:hover {
			box-shadow:
				0 40px 80px -18px rgba(0, 20, 40, 0.5),
				0 8px 28px rgba(0, 0, 0, 0.06);
		}

		/* ----- Заголовок (декоративный) ----- */
		.caption {
			text-align: center;
			margin-bottom: 1.8rem;
			letter-spacing: -0.02em;
		}

		h2 {
			color: #fff;
			ч background: transparent;
		}

		.caption h2 {
			font-weight: 500;
			font-size: 1.1rem;
			color: #fff;
			background: rgba(255, 255, 255, 0.4);
			display: inline-block;
			padding: 0.4rem 1.8rem;
			border-radius: 60px;
			backdrop-filter: blur(4px);
			border: 1px solid rgba(255, 255, 255, 0.5);
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
		}

		.caption h2 span {
			font-weight: 600;
			color: #1e3a8a;
		}

		/* ----- Список пагинации (flex) ----- */
		.pagination {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			align-items: center;
			gap: 0.6rem;
			list-style: none;
			padding: 0;
			margin: 0;
		}

		/* ----- Каждый пункт ----- */
		.page-item {
			display: inline-flex;
		}

		/* ----- Ссылки (основной стиль) ----- */
		.page-link {
			display: flex;
			align-items: center;
			justify-content: center;
			min-width: 3.8rem;
			height: 3.8rem;
			padding: 0 0.8rem;
			background: rgba(255, 255, 255, 0.03);
			backdrop-filter: blur(0.5px);
			border-radius: 60px;
			font-size: 1.3rem;
			font-weight: 550;
			color: #fff;
			text-decoration: none;
			border: 1px solid rgba(255, 255, 255, 0.7);
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.03);
			transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
			letter-spacing: 0.3px;
			position: relative;
			font-family: 'Inter', 'Segoe UI', sans-serif;
		}

		.page-links {
			display: inline-block;
			border: 2px solid red;
			border-radius: 50%;
			padding: 12px;
			text-decoration: none;
			perspective: 80px;
		}

		.page-links .flip-container {
			width: 40px;
			height: 40px;
			position: relative;
			transform-style: preserve-3d;
			animation: flip3D 2s ease-in-out infinite;
		}

		.page-links .front {
			position: absolute;
			width: 100%;
			height: 100%;
			backface-visibility: hidden;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* Задняя сторона */
		.page-links .back {
			position: absolute;
			width: 100%;
			height: 100%;
			backface-visibility: hidden;
			transform: rotateY(180deg);
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		@keyframes flip3D {
			0% {
				transform: rotateY(0deg);
			}

			100% {
				transform: rotateY(360deg);
			}
		}

		/* Эффект при наведении */
		.page-link:hover {
			border-color: #b9c8e6;
			transform: translateY(-3px) scale(1.03);
			box-shadow: 0 16px 30px -8px rgba(30, 58, 138, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
			color: #0f172a;
			text-decoration: none;
		}

		/* Активная страница (визуально выделена) */
		.page-item.active .page-link {
			background: #1e3a8a;
			border-color: #1e3a8a;
			color: #ffffff;
			box-shadow: 0 12px 24px -8px rgba(30, 58, 138, 0.4), 0 4px 12px rgba(0, 0, 0, 0.08);
			transform: scale(1.02);
			font-weight: 600;
			pointer-events: none;
			backdrop-filter: none;
		}

		.page-item.active .page-link::after {
			content: "·";
			position: absolute;
			bottom: 0.1rem;
			font-size: 1.6rem;
			line-height: 0.6;
			color: rgba(255, 255, 255, 0.25);
			letter-spacing: 0;
		}

		/* СТИЛЬ МИШЕНИ ДЛЯ ПРОЙДЕННОГО ЗАДАНИЯ */
		.page-link.completed {
			border-color: #15fa32 !important;
			color: #ffffff !important;
			box-shadow: 0 0 0 0.5px #15fa32, 0 12px 24px -8px rgba(30, 58, 138, 0.2) !important;
			transform: scale(1.05);
			font-weight: 700;
		}

		.page-link.completed::before {
			content: "";
			position: absolute;
			top: 24px;
			right: -48px;
			z-index: 100;
			background: url("6.png") no-repeat 0 0;
			background-size: cover;
			color: #0f172a;
			font-size: 0.8rem;
			width: 70px;
			height: 7px;
			transform: rotate(15deg);
			transform-origin: left;
		}

		@media (min-width: 700px) {
			.pagination-wrapper {
				min-height: 300px;
				max-width: 600px;
			}
		}

		@media (max-width: 500px) {
			.pagination-wrapper {
				padding: 1.6rem 1.2rem;
				border-radius: 3rem;
			}

			.page-link {
				min-width: 3rem;
				height: 3rem;
				font-size: 1.1rem;
				padding: 0 0.5rem;
			}

			.caption h2 {
				font-size: 0.95rem;
				padding: 0.3rem 1.2rem;
			}

			.page-item.active .page-link::after {
				display: none;
			}
		}

		@media (max-width: 380px) {
			.pagination {
				gap: 0.4rem;
			}

			.page-link {
				min-width: 2.6rem;
				height: 2.6rem;
				font-size: 0.95rem;
				padding: 0 0.3rem;
				border-radius: 40px;
			}
		}

		.pagination .page-item:first-child .page-link {
			background: rgba(255, 255, 255, 0.25);
			border-color: transparent;
			box-shadow: none;
			font-weight: 400;
			color: #fff;
			backdrop-filter: blur(2px);
			font-size: 0.9rem;
			min-width: 3rem;
			letter-spacing: 0.4px;
		}

		.pagination .page-item:first-child .page-link:hover {
			background: rgba(255, 255, 255, 0.5);
			transform: none;
			box-shadow: none;
			color: #1e293b;
		}

		/* не показываем "стр." на совсем маленьких экранах */
		@media (max-width: 460px) {
			.pagination .page-item:first-child {
				display: none;
			}
		}

		/* ----- Тень для активной вкладки с имитацией "выбрано" ----- */
		.page-item.active .page-link {
			background: #1e3a8a;
			border-color: #1e3a8a;
			color: #ffffff;
			box-shadow: 0 12px 24px -8px rgba(30, 58, 138, 0.4), 0 4px 12px rgba(0, 0, 0, 0.08);
			transform: scale(1.02);
			font-weight: 600;
			pointer-events: none;
			backdrop-filter: none;
		}

		/* эффект "нажатия" для неактивных (игровой момент) */
		.page-link:active:not(.active .page-link) {
			transform: scale(0.94);
			background: #e9edf5;
			transition-duration: 0.06s;
		}

		/* дополнительный акцент на текущей странице (цифра) */
		.page-item.active .page-link {
			background: #1e3a8a;
			background: linear-gradient(145deg, #1e3a8a, #1e2f6e);
		}

		/* ссылки в состоянии "посещено" не меняют цвет */
		.page-link:visited {
			color: #fff;
		}

		.page-item.active .page-link:visited {
			color: #ffffff;
		}

		.info-note {
			margin-top: 2rem;
			font-size: 0.9rem;
			color: #334155;
			background: rgba(255, 255, 255, 0.3);
			backdrop-filter: blur(4px);
			padding: 0.4rem 1.6rem;
			border-radius: 60px;
			border: 1px solid rgba(255, 255, 255, 0.3);
			letter-spacing: 0.3px;
			font-weight: 400;

		.info-note strong {
			font-weight: 600;
			color: #1e3a8a;
		}

		/* анимация при загрузке (лёгкое появление) */
		.pagination-wrapper {
			animation: softRise 0.5s ease forwards;
		}

		@keyframes softRise {
			0% {
				opacity: 0;
				transform: translateY(20px) scale(0.97);
			}

			100% {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		/* Кастомный скролл (для красоты) */
		::-webkit-scrollbar {
			width: 6px;
			background: transparent;
		}

		::-webkit-scrollbar-track {
			background: rgba(255, 255, 255, 0.1);
			border-radius: 20px;
		}

		::-webkit-scrollbar-thumb {
			background: #b9c8e6;
			border-radius: 20px;
		}

		h2 {
			margin-bottom: 32px;
		}

		.arrow {
			position: absolute;
			bottom: -86px;
			left: 180px;
		}

		.row {
			position: absolute;
			bottom: -53px;
			left: 300px;
			animation: row 1s ease-out 1;
			transform: translateX(-230px);
		}

		@keyframes row {
			0% {
				opacity: 0;
				transform: translateX(-110px);
			}

			50% {
				transform: translateX(-110px);
			}

			100% {
				transform: translateX(-230px);
				opacity: 1;
			}
		}

		.row2 {
			animation: row2 1.5s ease-out 1;
			transform: translateX(-230px) translateY(-5px) rotate(5deg);
			opacity: 1;
		}

		@keyframes row2 {
			0% {
				opacity: 0;
				transform: translateX(-110px);
			}

			70% {
				transform: translateX(-110px);
			}

			100% {
				transform: translateX(-230px) translateY(-5px) rotate(5deg);
				opacity: 1;
			}
		}

		.row3 {
			animation: row3 2s ease-out 1;
			transform: translateX(-230px) translateY(5px) rotate(-5deg);
			opacity: 1;
		}

		@keyframes row3 {
			0% {
				opacity: 0;
				transform: translateX(-110px);
			}

			80% {
				transform: translateX(-110px);
			}

			100% {
				transform: translateX(-230px) translateY(5px) rotate(-5deg);
				opacity: 1;
			}
		}

		/* Стили для кнопки очистки */
		.clear-btn {
			margin-top: 1.5rem;
			padding: 0.7rem 2rem;
			background: #44b0ef;
			color: white;
			border: none;
			border-radius: 60px;
			font-size: 1rem;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s ease;
			box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
			font-family: 'Inter', 'Segoe UI', sans-serif;
		}

		.clear-btn:hover {
			background: #dc2626;
			transform: scale(1.03);
			box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
		}

		.clear-btn:active {
			transform: scale(0.95);
		}

		.clear-btn:disabled {
			background: #6b7280;
			cursor: not-allowed;
			box-shadow: none;
		}

		.clear-btn:disabled:hover {
			transform: none;
		}

		.spider {
			top: -20px;
			left: 40px;
		}

		.rino {
			right: 50px;
			left: auto;
			top: -2px;
			transform: rotate(180deg);
		}

		.stich {
			left: 100px;
		}

		.kaka {
			left: 260px;
		}

		.answers {
			color: gray;
			text-decoration: none;
			display: block;
			font-weight: bold;
			margin-top: 30px;
		}

		.checkmate {
			position: absolute;
			top: -8px;
			display: block;
			text-decoration: none;
			transform: rotate(180deg) translate(-20px);
			font-size: 30px;
			animation: check 4s ease-in-out infinite;
		}

		@keyframes check {
			0% {
				transform: translate(-20px) rotate(180deg);
			}

			50% {
				transform: translate(40px) rotate(180deg);
			}

			100% {
				transform: translate(-20px) rotate(180deg);
			}
		}
	</style>
</head>

	<!-- Кнопка очистки прогресса -->
	<button class="clear-btn" id="clearProgressBtn">Начать с начала</button>

	<script>
		(function() {
			// Список всех ключей для заданий
			const STORAGE_KEYS = [
				'python_base_1_completed',
				'python_base_2_completed',
				'python_base_3_completed',
				'python_base_4_completed',
				'python_base_5_completed',
				'python_letters_completed',
			];

			// Получаем все ссылки, которые нужно проверять
			const base1Link = document.getElementById('base1Link');
			const base2Link = document.getElementById('base2Link');
			const base3Link = document.getElementById('base3Link');
			const base4Link = document.getElementById('base4Link');
			const base5Link = document.getElementById('base5Link');
			const clearBtn = document.getElementById('clearProgressBtn');

			// Функция обновления индикаторов (мишень)
			function updateIndicators() {
				// Проверяем каждый ключ и обновляем соответствующий элемент
				STORAGE_KEYS.forEach((key, index) => {
					let element;
					if (index === 0) {
						element = base1Link;
					} else if (index === 1) {
						element = base2Link;
					} else if (index === 2) {
						element = base3Link;
					} else if (index === 3) {
						element = base4Link;
					} else if (index === 4) {
						element = base5Link;
					} else if (index === 5) {
						element = lettersLink;
					} else if (index === 6) {
						element = list1Link;
					}

					if (element) {
						const isCompleted = localStorage.getItem(key) === 'true';
						if (isCompleted) {
							element.classList.add('completed');
						} else {
							element.classList.remove('completed');
						}
					}
				});
			}

			// Функция очистки прогресса (очищает все ключи)
			function clearAllProgress() {
				if (confirm('Вы уверены, что хотите очистить весь прогресс?')) {
					// Удаляем все ключи
					STORAGE_KEYS.forEach(key => {
						localStorage.removeItem(key);
					});

					updateIndicators();

					const infoNote = document.querySelector('.info-note');
					if (infoNote) {
						infoNote.textContent = '🗑️ Весь прогресс очищен!';
						infoNote.style.transition = 'opacity 0.3s';
						setTimeout(() => {
							infoNote.textContent = '🎯 Мишени — задания пройдены';
						}, 2000);
					}
					console.log('🗑️ Весь прогресс очищен');
				}
			}

			// Обновляем при загрузке
			updateIndicators();

			// Обработчик для кнопки очистки
			if (clearBtn) {
				clearBtn.addEventListener('click', clearAllProgress);
			}

			// Слушаем изменения в localStorage
			window.addEventListener('storage', function(e) {
				if (STORAGE_KEYS.includes(e.key)) {
					updateIndicators();
				}
			});

			// Остальной код для пагинации (без изменений)
			const pageLinks = document.querySelectorAll('.page-item:not(:first-child) .page-link');
			const statusSpan = document.querySelector('.pagination-wrapper .pagination + div strong');
			const pageItems = document.querySelectorAll('.page-item');

			function setActivePage(clickedLink) {
				const parentLi = clickedLink.closest('.page-item');
				if (!parentLi) return;

				pageItems.forEach(item => {
					if (item.querySelector('.page-link')?.innerText.trim() === 'стр.') return;
					item.classList.remove('active');
				});

				parentLi.classList.add('active');

				const pageNumber = clickedLink.innerText.trim();
				if (statusSpan && pageNumber) {
					statusSpan.innerText = pageNumber;
				}
			}

			pageLinks.forEach(link => {
				link.addEventListener('click', function(e) {
					e.preventDefault();
					if (this.closest('.page-item')?.classList.contains('active')) {
						return;
					}
					setActivePage(this);
					if (navigator.vibrate) navigator.vibrate(12);
				});
			});

			const activeFromMarkup = document.querySelector('.page-item.active');
			if (!activeFromMarkup) {
				const firstPage = document.querySelector('.page-item:not(:first-child)');
				if (firstPage) {
					firstPage.classList.add('active');
					const link = firstPage.querySelector('.page-link');
					if (link && statusSpan) {
						statusSpan.innerText = link.innerText.trim();
					}
				}
			} else {
				const activeLink = activeFromMarkup.querySelector('.page-link');
				if (activeLink && statusSpan) {
					statusSpan.innerText = activeLink.innerText.trim();
				}
			}

			const currentActive = document.querySelector('.page-item.active .page-link');
			if (currentActive && statusSpan) {
				statusSpan.innerText = currentActive.innerText.trim();
			}

			console.log('✨ Пагинация готова!');
		})();
	</script>
