<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="favicon.png">
	<title>Python</title>
	<style>
		/* ----- Сброс и база ----- */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			background: radial-gradient(circle at 30% 10%, #f0f4ff, #d9e2f0);
			font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
			padding: 2rem 1.5rem;
		}

		/* ----- Карточка-контейнер ----- */
		.pagination-wrapper {
			background: rgba(255, 255, 255, 0.6);
			backdrop-filter: blur(16px) saturate(180%);
			-webkit-backdrop-filter: blur(16px) saturate(180%);
			border-radius: 4rem;
			padding: 2rem 2.8rem;
			box-shadow:
				0 30px 60px -20px rgba(0, 20, 40, 0.4),
				0 8px 24px rgba(0, 0, 0, 0.04),
				inset 0 1px 0 rgba(255, 255, 255, 0.7);
			border: 1px solid rgba(255, 255, 255, 0.5);
			transition: box-shadow 0.3s ease, transform 0.2s ease;
			max-width: 800px;
			width: 100%;
		}

		.pagination-wrapper:hover {
			box-shadow:
				0 40px 80px -18px rgba(0, 20, 40, 0.5),
				0 8px 28px rgba(0, 0, 0, 0.06);
		}

		/* ----- Заголовок (декоративный) ----- */
		.caption {
			text-align: center;
			margin-bottom: 1.8rem;
			letter-spacing: -0.02em;
		}

		.caption h2 {
			font-weight: 500;
			font-size: 1.1rem;
			color: #1f2a44;
			background: rgba(255, 255, 255, 0.4);
			display: inline-block;
			padding: 0.4rem 1.8rem;
			border-radius: 60px;
			backdrop-filter: blur(4px);
			border: 1px solid rgba(255, 255, 255, 0.5);
			box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
		}

		.caption h2 span {
			font-weight: 600;
			color: #1e3a8a;
		}

		/* ----- Список пагинации (flex) ----- */
		.pagination {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			align-items: center;
			gap: 0.6rem;
			list-style: none;
			padding: 0;
			margin: 0;
		}

		/* ----- Каждый пункт ----- */
		.page-item {
			display: inline-flex;
		}

		/* ----- Ссылки (основной стиль) ----- */
		.page-link {
			display: flex;
			align-items: center;
			justify-content: center;
			min-width: 3.8rem;
			height: 3.8rem;
			padding: 0 0.8rem;
			background: rgba(255, 255, 255, 0.5);
			backdrop-filter: blur(4px);
			-webkit-backdrop-filter: blur(4px);
			border-radius: 60px;
			font-size: 1.3rem;
			font-weight: 550;
			color: #1e293b;
			text-decoration: none;
			border: 1px solid rgba(255, 255, 255, 0.7);
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.03);
			transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
			letter-spacing: 0.3px;
			position: relative;
			font-family: 'Inter', 'Segoe UI', sans-serif;
		}

		/* Эффект при наведении */
		.page-link:hover {
			background: #ffffff;
			border-color: #b9c8e6;
			transform: translateY(-3px) scale(1.03);
			box-shadow: 0 16px 30px -8px rgba(30, 58, 138, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
			color: #0f172a;
			text-decoration: none;
		}

		/* Активная страница (визуально выделена) */
		.page-item.active .page-link {
			background: #1e3a8a;
			border-color: #1e3a8a;
			color: #ffffff;
			box-shadow: 0 12px 24px -8px rgba(30, 58, 138, 0.4), 0 4px 12px rgba(0, 0, 0, 0.08);
			transform: scale(1.02);
			font-weight: 600;
			pointer-events: none;
			backdrop-filter: none;
		}

		.page-item.active .page-link::after {
			content: "·";
			position: absolute;
			bottom: 0.1rem;
			font-size: 1.6rem;
			line-height: 0.6;
			color: rgba(255, 255, 255, 0.25);
			letter-spacing: 0;
		}

		/* Адаптив: на маленьких экранах уменьшаем размер */
		@media (max-width: 500px) {
			.pagination-wrapper {
				padding: 1.6rem 1.2rem;
				border-radius: 3rem;
			}

			.page-link {
				min-width: 3rem;
				height: 3rem;
				font-size: 1.1rem;
				padding: 0 0.5rem;
			}

			.caption h2 {
				font-size: 0.95rem;
				padding: 0.3rem 1.2rem;
			}

			.page-item.active .page-link::after {
				display: none;
			}
		}

		@media (max-width: 380px) {
			.pagination {
				gap: 0.4rem;
			}

			.page-link {
				min-width: 2.6rem;
				height: 2.6rem;
				font-size: 0.95rem;
				padding: 0 0.3rem;
				border-radius: 40px;
			}
		}

		.pagination .page-item:first-child .page-link {
			background: rgba(255, 255, 255, 0.25);
			border-color: transparent;
			box-shadow: none;
			font-weight: 400;
			color: #475569;
			backdrop-filter: blur(2px);
			font-size: 0.9rem;
			min-width: 3rem;
			letter-spacing: 0.4px;
		}

		.pagination .page-item:first-child .page-link:hover {
			background: rgba(255, 255, 255, 0.5);
			transform: none;
			box-shadow: none;
			color: #1e293b;
		}

		/* не показываем "стр." на совсем маленьких экранах */
		@media (max-width: 460px) {
			.pagination .page-item:first-child {
				display: none;
			}
		}

		/* ----- Тень для активной вкладки с имитацией "выбрано" ----- */
		.page-item.active .page-link {
			background: #1e3a8a;
			border-color: #1e3a8a;
			color: #ffffff;
			box-shadow: 0 12px 24px -8px rgba(30, 58, 138, 0.4), 0 4px 12px rgba(0, 0, 0, 0.08);
			transform: scale(1.02);
			font-weight: 600;
			pointer-events: none;
			backdrop-filter: none;
		}

		/* эффект "нажатия" для неактивных (игровой момент) */
		.page-link:active:not(.active .page-link) {
			transform: scale(0.94);
			background: #e9edf5;
			transition-duration: 0.06s;
		}

		/* дополнительный акцент на текущей странице (цифра) */
		.page-item.active .page-link {
			background: #1e3a8a;
			background: linear-gradient(145deg, #1e3a8a, #1e2f6e);
		}

		/* ссылки в состоянии "посещено" не меняют цвет */
		.page-link:visited {
			color: #1e293b;
		}

		.page-item.active .page-link:visited {
			color: #ffffff;
		}

		/* ----- Небольшой подвал (информация) ----- */
		.info-note {
			margin-top: 2rem;
			font-size: 0.9rem;
			color: #334155;
			background: rgba(255, 255, 255, 0.3);
			backdrop-filter: blur(4px);
			padding: 0.4rem 1.6rem;
			border-radius: 60px;
			border: 1px solid rgba(255, 255, 255, 0.3);
			letter-spacing: 0.3px;
			font-weight: 400;
		}

		.info-note strong {
			font-weight: 600;
			color: #1e3a8a;
		}

		/* анимация при загрузке (лёгкое появление) */
		.pagination-wrapper {
			animation: softRise 0.5s ease forwards;
		}

		@keyframes softRise {
			0% {
				opacity: 0;
				transform: translateY(20px) scale(0.97);
			}

			100% {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		/* Кастомный скролл (для красоты) */
		::-webkit-scrollbar {
			width: 6px;
			background: transparent;
		}

		::-webkit-scrollbar-track {
			background: rgba(255, 255, 255, 0.1);
			border-radius: 20px;
		}

		::-webkit-scrollbar-thumb {
			background: #b9c8e6;
			border-radius: 20px;
		}
	</style>
</head>

<body>

	<div class="pagination-wrapper">

		<ul class="pagination">

				<a class="page-link" href="python/1.html">1</a>
				<a class="page-link" href="#">2</a>
		</ul>

	</div>

	<script>
		(function() {
			const pageLinks = document.querySelectorAll('.page-item:not(:first-child) .page-link');
			const statusSpan = document.querySelector('.pagination-wrapper .pagination + div strong');
			const pageItems = document.querySelectorAll('.page-item');

			// Функция обновления активного класса и текста статуса
			function setActivePage(clickedLink) {
				// Находим родительский <li> у кликнутой ссылки
				const parentLi = clickedLink.closest('.page-item');
				if (!parentLi) return;

				// Убираем класс active у всех элементов .page-item (кроме первого "стр.")
				pageItems.forEach(item => {
					// Пропускаем первый элемент (если это "стр.")
					if (item.querySelector('.page-link')?.innerText.trim() === 'стр.') return;
					item.classList.remove('active');
				});

				// Добавляем класс active текущему элементу
				parentLi.classList.add('active');

				// Обновляем текст статуса (номер страницы)
				const pageNumber = clickedLink.innerText.trim();
				if (statusSpan && pageNumber) {
					statusSpan.innerText = pageNumber;
				}

				// Обновляем текст в "стр." (можно сделать и красивее)
				// но оставим как есть
			}

			// Добавляем обработчик клика на все ссылки пагинации (кроме "стр.")
			pageLinks.forEach(link => {
				link.addEventListener('click', function(e) {
					e.preventDefault(); // отключаем переход, только демо

					// Если ссылка уже активна — ничего не делаем (можно выйти)
					if (this.closest('.page-item')?.classList.contains('active')) {
						return;
					}

					setActivePage(this);

					// Дополнительно: лёгкая тактильная обратная связь (вибрация, если поддерживается)
					if (navigator.vibrate) navigator.vibrate(12);
				});
			});

			// Инициализация: убедимся, что первая страница активна (уже есть класс active в разметке)
			// Но если вдруг активный класс потерялся — восстановим по статусу
			const activeFromMarkup = document.querySelector('.page-item.active');
			if (!activeFromMarkup) {
				const firstPage = document.querySelector('.page-item:not(:first-child)');
				if (firstPage) {
					firstPage.classList.add('active');
					const link = firstPage.querySelector('.page-link');
					if (link && statusSpan) {
						statusSpan.innerText = link.innerText.trim();
					}
				}
			} else {
				// синхронизируем статус
				const activeLink = activeFromMarkup.querySelector('.page-link');
				if (activeLink && statusSpan) {
					statusSpan.innerText = activeLink.innerText.trim();
				}
			}

			// Также обновляем статус, если активная страница уже есть, но текст статуса не синхронизирован
			const currentActive = document.querySelector('.page-item.active .page-link');
			if (currentActive && statusSpan) {
				statusSpan.innerText = currentActive.innerText.trim();
			}

			// Бонус: при наведении на неактивные ссылки — лёгкий эффект (уже через CSS)
			console.log('✨ Пагинация готова!');
		})();
	</script>

</body></html>
