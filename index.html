<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link type="image/x-icon" rel="icon" href="python.png">
	<title>🐍</title>
	<style>
		body {
			margin-top: 40px;
			background: #000;
			color: #fff;
			font-family: monospace;
			font-size: 30px;
			display: flex;
			flex-direction: column;
			gap: 20px;
			justify-content: center;
			align-content: center;
			align-items: center;
		}
		
		.card {
			border: 2px solid gray;
			border-radius: 10px;
			padding: 30px;
			width: fit-content;
		}

		.card .front,
		.card .back {
			border: 2px solid gray;
			padding: 30px;
			border-radius: 20px;
		}

		.card {
			display: flex;
			gap: 20px;
		}
	</style>
</head>

<body>

	<div class="card">
		<div class="front">
			a = 7
			print(a)
		</div>

		<div class="back">
			7
		</div>
	</div>

	<div class="card">
		<div class="front">
			b = a
			print(b)
		</div>

		<div class="back">
			7
		</div>
	</div>
	

	<div class="card">
		<div class="front">
			a, z, A, Z, a0, a_
		</div>

		<div class="back">
			0a = 1 Invalid decimal literal
		</div>
	</div>
	


</body></html>
