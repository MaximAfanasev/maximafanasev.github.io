<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Списки</title>
	<link rel="icon" type="image/png" href="../../favicon.png">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: radial-gradient(ellipse at 50% 30%, #0f172a, #020617);
			font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
			padding: 1.5rem;
		}

		.card {
			background: rgba(255, 255, 255, 0.04);
			backdrop-filter: blur(20px) saturate(180%);
			-webkit-backdrop-filter: blur(20px) saturate(180%);
			border-radius: 3rem;
			padding: 2.8rem 2.5rem;
			max-width: 720px;
			width: 100%;
			border: 1px solid rgba(255, 255, 255, 0.06);
			box-shadow: 0 50px 100px -30px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
			animation: fadeUp 0.5s ease forwards;
		}

		@keyframes fadeUp {
			0% {
				opacity: 0;
				transform: translateY(20px) scale(0.97);
			}

			100% {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		.header {
			text-align: center;
			margin-bottom: 2.5rem;
		}

		.header .icon {
			font-size: 2.5rem;
			display: block;
			margin-bottom: 0.3rem;
		}

		.header h1 {
			color: #f1f5f9;
			font-weight: 600;
			font-size: 1.6rem;
			letter-spacing: -0.5px;
		}

		.header p {
			color: #94a3b8;
			font-size: 0.95rem;
			margin-top: 0.3rem;
		}

		.task {
			background: rgba(15, 23, 42, 0.5);
			border-radius: 1.5rem;
			padding: 1.8rem;
			border: 1px solid rgba(255, 255, 255, 0.04);
			transition: border-color 0.3s ease;
		}

		.task-header {
			display: flex;
			align-items: center;
			gap: 0.8rem;
			margin-bottom: 1rem;
			flex-wrap: wrap;
		}

		.task-number {
			background: rgba(52, 211, 153, 0.15);
			color: #34d399;
			font-weight: 700;
			font-size: 0.8rem;
			padding: 0.2rem 0.8rem;
			border-radius: 60px;
			letter-spacing: 0.5px;
		}

		.task-title {
			color: #94a3b8;
			font-size: 0.85rem;
			font-weight: 500;
		}

		.code-block {
			background: #0b111e;
			border-radius: 1rem;
			padding: 1.2rem 1.5rem;
			font-family: 'JetBrains Mono', 'Fira Code', monospace;
			font-size: 0.95rem;
			line-height: 1.8rem;
			color: #e2e8f0;
			margin-bottom: 1.2rem;
			border-left: 3px solid #34d399;
			overflow-x: auto;
		}

		.code-line {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			flex-wrap: wrap;
		}

		.code-line .prompt {
			color: #64748b;
			user-select: none;
		}

		.code-line .var {
			color: #f472b6;
		}

		.code-line .op {
			color: #facc15;
		}

		.code-line .func {
			color: #34d399;
		}

		.code-line .paren {
			color: #94a3b8;
		}

		.code-line .string {
			color: #6ee7b7;
		}

		.code-line .comment {
			color: #475569;
			font-style: italic;
			font-size: 0.85rem;
		}

		.code-line .bracket {
			color: #60a5fa;
		}

		.code-line .number {
			color: #60a5fa;
		}

		.code-line .method {
			color: #c084fc;
		}

		.input-row {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 0.8rem;
			background: rgba(15, 23, 42, 0.6);
			padding: 0.3rem 0.3rem 0.3rem 1.5rem;
			border-radius: 100px;
			border: 1px solid #2d3a4f;
			transition: border 0.25s, background 0.25s, box-shadow 0.25s;
		}

		.input-row:focus-within {
			border-color: #34d399;
			background: #1a253a;
			box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.08);
		}

		.input-row label {
			color: #94a3b8;
			font-size: 0.9rem;
			font-weight: 500;
			white-space: nowrap;
		}

		.input-row input {
			flex: 1;
			min-width: 60px;
			background: transparent;
			border: none;
			padding: 0.6rem 0.2rem;
			font-size: 1.1rem;
			font-weight: 500;
			color: #f1f5f9;
			outline: none;
			font-family: 'JetBrains Mono', monospace;
			text-align: center;
		}

		.input-row input::placeholder {
			color: #475569;
			font-weight: 300;
			font-size: 0.85rem;
			opacity: 0.6;
		}

		.btn-check {
			background: #34d399;
			border: none;
			border-radius: 60px;
			padding: 0.55rem 1.8rem;
			font-weight: 600;
			font-size: 0.9rem;
			color: #0f172a;
			cursor: pointer;
			transition: all 0.15s ease;
			box-shadow: 0 4px 14px rgba(52, 211, 153, 0.2);
			white-space: nowrap;
			font-family: 'Inter', sans-serif;
		}

		.btn-check:hover {
			background: #6ee7b7;
			transform: scale(1.02);
			box-shadow: 0 8px 24px rgba(52, 211, 153, 0.3);
		}

		.btn-check:active {
			transform: scale(0.95);
			background: #10b981;
		}

		.btn-check:disabled {
			opacity: 0.5;
			cursor: not-allowed;
			transform: none !important;
		}

		.task-status {
			display: flex;
			align-items: center;
			gap: 0.6rem;
			margin-top: 0.8rem;
			font-size: 0.9rem;
			font-weight: 500;
			min-height: 2rem;
			padding: 0.3rem 0.8rem;
			border-radius: 60px;
			transition: all 0.3s ease;
		}

		.task-status .icon {
			font-size: 1.2rem;
		}

		.task-status.pending {
			color: #94a3b8;
			background: rgba(148, 163, 184, 0.05);
		}

		.task-status.correct {
			color: #6ee7b7;
			background: rgba(52, 211, 153, 0.08);
			border: 1px solid rgba(52, 211, 153, 0.2);
		}

		.task-status.wrong {
			color: #fca5a5;
			background: rgba(251, 113, 133, 0.08);
			border: 1px solid rgba(251, 113, 133, 0.2);
			animation: shake 0.4s ease;
		}

		@keyframes shake {

			0%,
			100% {
				transform: translateX(0);
			}

			25% {
				transform: translateX(-10px);
			}

			75% {
				transform: translateX(10px);
			}
		}

		.hidden {
			display: none !important;
		}

		.completed-badge {
			display: inline-block;
			background: rgba(52, 211, 153, 0.15);
			color: #6ee7b7;
			padding: 0.2rem 1rem;
			border-radius: 60px;
			font-size: 0.7rem;
			font-weight: 600;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			border: 1px solid rgba(52, 211, 153, 0.2);
		}

		@media (max-width: 520px) {
			.card {
				padding: 1.8rem 1.2rem;
				border-radius: 2rem;
			}

			.code-block {
				font-size: 0.8rem;
				padding: 1rem;
				line-height: 1.6rem;
			}

			.input-row {
				padding: 0.3rem 0.3rem 0.3rem 1rem;
				border-radius: 60px;
			}

			.input-row input {
				font-size: 0.9rem;
				padding: 0.5rem 0.1rem;
				min-width: 40px;
			}

			.btn-check {
				padding: 0.5rem 1.2rem;
				font-size: 0.8rem;
			}

			.task {
				padding: 1.2rem;
			}

			.header h1 {
				font-size: 1.3rem;
			}
		}
	</style>
</head>

<body>

	<div class="card">
		<div class="header">
			<span class="icon">📌</span>
			<h1>Метод insert()</h1>
			<p>Введите изменённый список</p>
		</div>

		<div class="task" id="task1">
			<div class="task-header">
				<span class="task-number">Задание</span>
				<span class="task-title">a.insert(2, 'd')</span>
				<span id="badge1" class="completed-badge hidden">✅ пройдено</span>
			</div>
			<div class="code-block">
				<div class="code-line">
					<span class="prompt">❯</span>
					<span class="var">a</span> <span class="op">=</span> <span class="bracket">[</span><span class="string">'a'</span><span class="op">,</span> <span class="string">'b'</span><span class="op">,</span> <span class="string">'c'</span><span class="bracket">]</span>
				</div>
				<div class="code-line">
					<span class="prompt">❯</span>
					<span class="var">a</span><span class="method">.insert</span><span class="paren">(</span><span class="number">2</span><span class="op">,</span> <span class="string">'d'</span><span class="paren">)</span>
				</div>
				<div class="code-line" style="margin-top: 0.3rem; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 0.3rem;">
					<span class="prompt">❯</span>
					<span class="func">print</span><span class="paren">(</span><span class="var">a</span><span class="paren">)</span>
					<span class="comment"># Что выведет?</span>
				</div>
			</div>
			<div class="input-row">
				<label for="answer1">Ответ:</label>
				<input type="text" id="answer1" placeholder="введите список" autocomplete="off">
				<button class="btn-check" id="check1">Проверить</button>
			</div>
			<div id="status1" class="task-status pending">
				<span class="icon">⏳</span> Ожидание ответа
			</div>
		</div>
	</div>

	<script>
		(function() {
			const input = document.getElementById('answer1');
			const checkBtn = document.getElementById('check1');
			const statusEl = document.getElementById('status1');
			const badgeEl = document.getElementById('badge1');

			const CORRECT_ANSWER = "['a', 'b', 'd', 'c']";

			function normalizeInput(str) {
				return str.replace(/\s/g, '');
			}

			function setStatus(isCorrect) {
				if (isCorrect) {
					statusEl.className = 'task-status correct';
					statusEl.innerHTML = '<span class="icon">✅</span> Верно!';
					badgeEl.classList.remove('hidden');
					input.disabled = true;
					checkBtn.disabled = true;
					input.style.opacity = '0.6';

					const headerIcon = document.querySelector('.header .icon');
					headerIcon.textContent = '🏆';
					document.querySelector('.header p').textContent = 'Задание пройдено!';
				} else {
					statusEl.className = 'task-status wrong';
					statusEl.innerHTML = '<span class="icon">❌</span> Неверно. Попробуй ещё раз.';
					setTimeout(() => {
						statusEl.className = 'task-status pending';
						statusEl.innerHTML = '<span class="icon">⏳</span> Ожидание ответа';
					}, 1500);
				}
			}

			function checkAnswer() {
				const answer = input.value.trim();

				if (answer === '') {
					statusEl.className = 'task-status pending';
					statusEl.innerHTML = '<span class="icon">✏️</span> Введите ответ';
					setTimeout(() => {
						statusEl.innerHTML = '<span class="icon">⏳</span> Ожидание ответа';
					}, 1200);
					return;
				}

				const normalizedInput = normalizeInput(answer);
				const normalizedCorrect = normalizeInput(CORRECT_ANSWER);

				const isCorrect = normalizedInput === normalizedCorrect;
				setStatus(isCorrect);
			}

			checkBtn.addEventListener('click', checkAnswer);

			input.addEventListener('keydown', (e) => {
				if (e.key === 'Enter') {
					e.preventDefault();
					checkAnswer();
				}
			});

			input.focus();
		})();
	</script>

</body></html>
