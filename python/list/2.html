<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Списки</title>
	<link rel="icon" type="image/png" href="../../favicon.png">
	<link rel="icon" type="image/png" href="../../favicon.png">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: radial-gradient(ellipse at 50% 30%, #0f172a, #020617);
			font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
			padding: 1.5rem;
		}

		.card {
			background: rgba(255, 255, 255, 0.04);
			backdrop-filter: blur(20px) saturate(180%);
			-webkit-backdrop-filter: blur(20px) saturate(180%);
			border-radius: 3rem;
			padding: 2.8rem 2.5rem;
			max-width: 660px;
			width: 100%;
			border: 1px solid rgba(255, 255, 255, 0.06);
			box-shadow: 0 50px 100px -30px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
			transition: box-shadow 0.3s ease;
		}

		.card:hover {
			box-shadow: 0 60px 120px -25px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.08);
		}

		/* Блок с кодом */
		.code-block {
			background: #080d1a;
			border-radius: 2rem;
			padding: 1.8rem 2rem;
			border-left: 5px solid #60a5fa;
			box-shadow: inset 0 2px 12px rgba(0, 0, 0, 0.7), 0 8px 24px rgba(0, 0, 0, 0.4);
			margin-bottom: 2.2rem;
			font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
			font-size: 1.2rem;
			line-height: 2.6rem;
			color: #e2e8f0;
		}

		.code-line {
			display: flex;
			align-items: center;
			gap: 0.8rem;
			flex-wrap: wrap;
		}

		.code-line .prompt {
			color: #64748b;
			user-select: none;
			font-weight: 300;
			min-width: 1.8rem;
		}

		.code-line .var {
			color: #f472b6;
		}

		.code-line .op {
			color: #facc15;
		}

		.code-line .func {
			color: #34d399;
		}

		.code-line .paren {
			color: #94a3b8;
		}

		.code-line .string {
			color: #6ee7b7;
		}

		.code-line .comment {
			color: #475569;
			font-size: 0.8rem;
			margin-left: 0.3rem;
			font-style: italic;
		}

		.code-line .output {
			color: #60a5fa;
			font-weight: 500;
		}

		.code-line .bracket {
			color: #f472b6;
		}

		.divider {
			border: none;
			border-top: 1px solid rgba(255, 255, 255, 0.05);
			margin: 0.6rem 0 0.8rem 0;
		}

		.question-tag {
			display: inline-block;
			background: rgba(96, 165, 250, 0.08);
			padding: 0.2rem 1.2rem;
			border-radius: 60px;
			font-size: 0.75rem;
			color: #60a5fa;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			font-weight: 600;
			margin-bottom: 0.2rem;
		}

		/* Поле ввода и кнопка */
		.input-area {
			display: flex;
			flex-direction: column;
			gap: 1.2rem;
		}

		.input-row {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 0.8rem;
			background: rgba(15, 23, 42, 0.6);
			padding: 0.3rem 0.3rem 0.3rem 1.8rem;
			border-radius: 100px;
			border: 1px solid #2d3a4f;
			transition: border 0.25s, background 0.25s, box-shadow 0.25s;
			box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
		}

		.input-row:focus-within {
			border-color: #60a5fa;
			background: #1a253a;
			box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.08), 0 8px 24px rgba(0, 0, 0, 0.5);
		}

		.input-row label {
			color: #94a3b8;
			font-weight: 500;
			font-size: 1rem;
			letter-spacing: 0.3px;
			white-space: nowrap;
			display: flex;
			align-items: center;
			gap: 0.4rem;
		}

		.input-row label .accent {
			color: #60a5fa;
			font-weight: 600;
		}

		.input-row input {
			flex: 1;
			min-width: 80px;
			background: transparent;
			border: none;
			padding: 0.75rem 0.2rem;
			font-size: 1.2rem;
			font-weight: 500;
			color: #f1f5f9;
			outline: none;
			font-family: 'JetBrains Mono', monospace;
			text-align: center;
			letter-spacing: 0.5px;
		}

		.input-row input::placeholder {
			color: #475569;
			font-weight: 300;
			font-size: 0.9rem;
			opacity: 0.6;
		}

		.btn-check {
			background: #60a5fa;
			border: none;
			border-radius: 60px;
			padding: 0.7rem 2rem;
			font-weight: 600;
			font-size: 1rem;
			color: #0f172a;
			cursor: pointer;
			transition: all 0.15s ease;
			box-shadow: 0 4px 16px rgba(96, 165, 250, 0.2);
			white-space: nowrap;
			letter-spacing: 0.3px;
			font-family: 'Inter', sans-serif;
		}

		.btn-check:hover {
			background: #93bbfc;
			transform: scale(1.03);
			box-shadow: 0 8px 28px rgba(96, 165, 250, 0.3);
		}

		.btn-check:active {
			transform: scale(0.95);
			background: #3b82f6;
		}

		.message-box {
			min-height: 3.4rem;
			padding: 0.7rem 1.2rem;
			border-radius: 60px;
			background: rgba(15, 23, 42, 0.5);
			backdrop-filter: blur(4px);
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 500;
			font-size: 1.05rem;
			border: 1px solid transparent;
			transition: all 0.3s ease;
			text-align: center;
			gap: 0.6rem;
			flex-wrap: wrap;
		}

		.message-box.neutral {
			color: #94a3b8;
			border-color: #2d3a4f;
		}

		.message-box.success {
			background: rgba(52, 211, 153, 0.1);
			border-color: #34d399;
			color: #6ee7b7;
			box-shadow: 0 0 24px rgba(52, 211, 153, 0.04);
		}

		.message-box.error {
			background: rgba(251, 113, 133, 0.08);
			border-color: #f87171;
			color: #fca5a5;
			box-shadow: 0 0 24px rgba(251, 113, 133, 0.03);
		}

		.message-box .icon {
			font-size: 1.2rem;
			line-height: 1;
		}

		.message-box .answer-preview {
			background: rgba(255, 255, 255, 0.04);
			padding: 0.1rem 0.8rem;
			border-radius: 20px;
			font-family: 'JetBrains Mono', monospace;
			font-size: 0.9rem;
			color: #e2e8f0;
		}

		.hint {
			color: #64748b;
			font-size: 0.8rem;
			text-align: center;
			margin-top: 0.3rem;
			letter-spacing: 0.2px;
			opacity: 0.8;
		}

		.hint kbd {
			background: #1e293b;
			padding: 0.1rem 0.8rem;
			border-radius: 30px;
			font-family: 'JetBrains Mono', monospace;
			color: #cbd5e1;
			font-size: 0.75rem;
			border: 1px solid #334155;
		}

		.hint strong {
			color: #60a5fa;
		}

		@media (max-width: 520px) {
			.card {
				padding: 1.8rem 1.2rem;
				border-radius: 2rem;
			}

			.code-block {
				font-size: 0.95rem;
				padding: 1.2rem 1.2rem;
				line-height: 2.2rem;
			}

			.input-row {
				padding: 0.3rem 0.3rem 0.3rem 1.2rem;
				border-radius: 60px;
			}

			.input-row input {
				font-size: 1rem;
				padding: 0.6rem 0.1rem;
				min-width: 60px;
			}

			.btn-check {
				padding: 0.6rem 1.2rem;
				font-size: 0.9rem;
			}

			.message-box {
				font-size: 0.9rem;
				padding: 0.5rem 1rem;
				min-height: 2.8rem;
			}
		}

		@media (max-width: 400px) {
			.input-row {
				flex-wrap: wrap;
				justify-content: center;
				padding: 0.5rem 0.8rem;
				border-radius: 2rem;
			}

			.input-row input {
				width: 100%;
				text-align: center;
				font-size: 1.1rem;
			}

			.btn-check {
				width: 100%;
				justify-content: center;
			}

			.code-block {
				font-size: 0.85rem;
				padding: 1rem;
				line-height: 2rem;
			}
		}

		/* анимация появления */
		.card {
			animation: fadeUp 0.5s ease forwards;
		}

		@keyframes fadeUp {
			0% {
				opacity: 0;
				transform: translateY(20px) scale(0.97);
			}

			100% {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}
	</style>
</head>

<body>

	<div class="card">

		<!-- Блок с кодом -->
		<div class="code-block">
			<!-- c = ('a', 'b', 'c') -->
			<div class="code-line">
				<span class="prompt">❯</span>
				<span class="var">c</span>
				<span class="op">=</span>
				<span class="paren">(</span><span class="string">'a'</span><span class="op">,</span> <span class="string">'b'</span><span class="op">,</span> <span class="string">'c'</span><span class="paren">)</span>
			</div>
			<!-- print(list(c)) -->
			<div class="code-line" style="border-top: 1px solid rgba(255,255,255,0.04); padding-top: 0.3rem; margin-top: 0.2rem;">
				<span class="prompt">❯</span>
				<span class="func">print</span><span class="paren">(</span><span class="func">list</span><span class="paren">(</span><span class="var">c</span><span class="paren">))</span>
			</div>
			<!-- # ['a', 'b', 'c'] -->
			<div class="code-line" style="margin-top: 0.2rem;">
				<span class="comment"># Что выведет print(list(c))?</span>
			</div>
		</div>

		<!-- Поле ввода -->
		<div class="input-area">
			<div class="input-row">
				<label for="answerInput">
					<span>⏺</span> Ответ:
				</label>
				<input type="text" id="answerInput" placeholder="введите список..." value="" autofocus spellcheck="false" autocomplete="off">
				<button class="btn-check" id="checkBtn">Проверить</button>
			</div>

			<div id="messageBox" class="message-box neutral">
				<span class="icon">⌨️</span> введите результат в виде списка
			</div>
		</div>
	</div>

	<script>
		(function() {
			const input = document.getElementById('answerInput');
			const checkBtn = document.getElementById('checkBtn');
			const messageBox = document.getElementById('messageBox');

			// Правильный ответ: список ['a', 'b', 'c']
			const TARGET = ['a', 'b', 'c'];
			const STORAGE_KEY = 'python_list_2_completed';

			function normalizeInput(str) {
				// Удаляем лишние пробелы, убираем кавычки, приводим к массиву
				let cleaned = str.trim();
				
				// Убираем квадратные скобки если есть
				cleaned = cleaned.replace(/^\[|\]$/g, '');
				
				// Разбиваем по запятым
				let parts = cleaned.split(',').map(s => s.trim());
				
				// Убираем кавычки (одинарные и двойные)
				parts = parts.map(s => s.replace(/^['"]|['"]$/g, ''));
				
				// Убираем пустые элементы
				parts = parts.filter(s => s !== '');
				
				return parts;
			}

			function setMessage(text, type = 'neutral', icon = '') {
				messageBox.innerHTML = icon ? `<span class="icon">${icon}</span> ${text}` : text;
				messageBox.classList.remove('success', 'error', 'neutral');
				messageBox.classList.add(type);
			}

			function validate() {
				const raw = input.value;

				if (raw.trim() === '') {
					setMessage('поле пустое, введите список', 'neutral', '✏️');
					return;
				}

				const parts = normalizeInput(raw);

				// Проверка на пустые элементы
				if (parts.length === 0) {
					setMessage('введите элементы списка через запятую', 'neutral', '⚠️');
					return;
				}

				// Сравниваем с правильным ответом
				const isCorrect = parts.length === TARGET.length && parts.every((p, i) => p === TARGET[i]);

				if (isCorrect) {
					setMessage(
						`✅ Верно! list(c) → ['a', 'b', 'c']`,
						'success',
						'🎉'
					);
					// Сохраняем в localStorage
					localStorage.setItem(STORAGE_KEY, 'true');
					
					input.style.transition = 'box-shadow 0.2s';
					input.style.boxShadow = '0 0 0 3px #34d399';
					setTimeout(() => {
						input.style.boxShadow = 'none';
					}, 700);

					setTimeout(() => {
						window.location.href = '../../index.html';
					}, 1500);
				} else {
					let errorMsg = '';
					if (parts.length !== TARGET.length) {
						errorMsg = `должно быть ${TARGET.length} элемента, вы ввели ${parts.length}`;
					} else {
						let diffIndex = -1;
						for (let i = 0; i < TARGET.length; i++) {
							if (parts[i] !== TARGET[i]) {
								diffIndex = i;
								break;
							}
						}
						if (diffIndex !== -1) {
							errorMsg = `ошибка на позиции ${diffIndex + 1}: ожидается «${TARGET[diffIndex]}», вы ввели «${parts[diffIndex] || '?'}»`;
						} else {
							errorMsg = 'неверный список';
						}
					}
					setMessage(
						`❌ Неверно. ${errorMsg}`,
						'error',
						'😅'
					);
					input.style.transition = 'box-shadow 0.15s';
					input.style.boxShadow = '0 0 0 3px #f87171';
					setTimeout(() => {
						input.style.boxShadow = 'none';
					}, 500);
				}
			}

			// Обработчики
			checkBtn.addEventListener('click', validate);

			input.addEventListener('keydown', (e) => {
				if (e.key === 'Enter') {
					e.preventDefault();
					validate();
				}
			});

			// При загрузке проверяем, не пройдено ли уже
			if (localStorage.getItem(STORAGE_KEY) === 'true') {
				setMessage('✅ Задание уже пройдено! 🎯', 'success');
			}

			input.addEventListener('input', function() {
				if (messageBox.classList.contains('success') || messageBox.classList.contains('error')) {
					if (this.value.trim() === '') {
						setMessage('введите список', 'neutral', '✏️');
					} else {
						setMessage('редактирование...', 'neutral', '⌨️');
					}
				}
			});

			input.focus();

			if (input.value.trim() === '') {
				setMessage('введите результат в виде списка', 'neutral', '⌨️');
			}
		})();
	</script>

</body></html>
