	tr:nth-child(3) td:nth-child(2n-1),
	tr:nth-child(5) td:nth-child(2n-1),
	tr:nth-child(7) td:nth-child(2n-1) {
		background: #EDEECF;
		position: relative;
	}

	tr:nth-child(4) td:nth-child(2n),
	tr:nth-child(6) td:nth-child(2n),
	tr:nth-child(8) td:nth-child(2n) {
		background: #EDEECF;
		position: relative;
	}
	
	tr:nth-child(7) td:nth-child(5) img {
		animation: slide 2s ease infinite;
		position: absolute;
			top: 0;
	}
	
	@keyframes slide {
		0% {
			top: 0;
		}
		100% {
			transform: translateY(-55px)

	}
